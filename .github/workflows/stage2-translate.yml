name: 'Stage 2: Translate and Rebuild'

on:
  push:
    paths:
      - '.github/workflows/stage2-translate.yml'
  workflow_dispatch:
    inputs:
      locales:
        description: 'Comma-separated locales to add'
        required: true
        default: 'zh-Hans'

jobs:
  translate_and_rebuild:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: 'main'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 'Enable Corepack'
        run: corepack enable

      - name: 'Read meta.json'
        id: meta
        run: |
          echo "buildCommand=$(jq -r '.buildCommand // "npx docusaurus build"' .github/scripts/meta.json)" >> $GITHUB_OUTPUT
          echo "buildOutput=$(jq -r '.buildOutput // "build"' .github/scripts/meta.json)" >> $GITHUB_OUTPUT
          echo "docusaurusRoot=$(jq -r '.docusaurusRoot // "."' .github/scripts/meta.json)" >> $GITHUB_OUTPUT

      - name: 'Add i18n locale config'
        run: |
          LOCALES="${{ github.event.inputs.locales }}"
          CONFIG_FILE=""
          for ext in js ts mjs; do
            [ -f "docusaurus.config.${ext}" ] && CONFIG_FILE="docusaurus.config.${ext}" && break
          done
          [ -z "$CONFIG_FILE" ] && echo "No config found" && exit 1
          
          LOCALE_ARRAY=$(echo "$LOCALES" | tr ',' '\n' | sed "s/.*/'&'/" | tr '\n' ',' | sed 's/,$//')
          
          if ! grep -q "i18n" "$CONFIG_FILE"; then
            node -e "
            const fs = require('fs');
            let c = fs.readFileSync('$CONFIG_FILE', 'utf8');
            const i18n = \"\n  i18n: { defaultLocale: 'en', locales: ['en', ${LOCALE_ARRAY}] },\";
            for (const p of [/(module\.exports\s*=\s*\{)/, /(export\s+default\s*\{)/, /(const\s+config\s*[:=]\s*\{)/]) {
              const m = c.match(p);
              if (m) { c = c.slice(0, m.index + m[0].length) + i18n + c.slice(m.index + m[0].length); break; }
            }
            fs.writeFileSync('$CONFIG_FILE', c);
            console.log('Injected i18n config');
            "
          fi

      - name: 'Place translated files (placeholder copies)'
        run: |
          for LOCALE in $(echo "${{ github.event.inputs.locales }}" | tr ',' ' '); do
            if [ -d "i18n/en" ]; then
              mkdir -p "i18n/${LOCALE}"
              cp -r "i18n/en/"* "i18n/${LOCALE}/"
              echo "Copied i18n JSONs for ${LOCALE}"
            fi
            if [ -d "docs" ]; then
              TARGET="i18n/${LOCALE}/docusaurus-plugin-content-docs/current"
              mkdir -p "$TARGET"
              cp -r docs/* "$TARGET/"
              echo "Copied docs for ${LOCALE}"
            fi
          done

      - name: 'Rebuild'
        run: |
          if [ -f ".github/scripts/rebuild.sh" ]; then
            chmod +x .github/scripts/rebuild.sh
            bash .github/scripts/rebuild.sh
          else
            npm install --legacy-peer-deps 2>/dev/null || npm install
            ${{ steps.meta.outputs.buildCommand }}
          fi

      - name: 'Commit'
        run: |
          BUILD_OUTPUT="${{ steps.meta.outputs.buildOutput }}"
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add .
          find . -name "$BUILD_OUTPUT" -type d -maxdepth 4 -not -path "./.git/*" | while read d; do
            [ -f "$d/index.html" ] && git add -f "$d/"
          done
          if ! git diff --staged --quiet; then
            git commit --no-verify -m "Stage 2: translations (${{ github.event.inputs.locales }})"
            git push origin main
          fi
